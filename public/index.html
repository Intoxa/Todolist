<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Todo Dev</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>Todo Dev</h1>
    <div class="card">
      <label for="pseudo">Ton pseudo</label>
      <input id="pseudo" type="text" maxlength="30" placeholder="Ex: FuFu">
    </div>
    <div class="card">
      <form id="todo-form">
        <label for="todo-input">Nouvelle tâche</label>
        <div class="row">
          <input id="todo-input" type="text" maxlength="200" placeholder="Ex: Corriger le script garage">
          <button type="submit">Ajouter</button>
        </div>
      </form>
    </div>
    <div class="card">
      <div id="count"></div>
      <ul id="todo-list"></ul>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
